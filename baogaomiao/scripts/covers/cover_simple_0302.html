<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>封面</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@900&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Serif SC', serif; }
        .cover { width: 640px; height: 900px; background: linear-gradient(135deg, #FB0151 0%, #fb5a7b 100%); padding: 40px; box-sizing: border-box; }
        .title { font-size: 56px; font-weight: 900; color: #000; line-height: 1.2; margin-bottom: 20px; }
        .subtitle { font-size: 20px; font-weight: 700; color: #000; text-transform: uppercase; letter-spacing: 2px; }
        .category { background: rgba(255,255,255,0.9); padding: 20px; border-radius: 12px; margin-top: 20px; }
        .category-label { font-size: 14px; font-weight: 700; color: #000; margin-bottom: 5px; }
        .category-value { font-size: 14px; color: #333; }
        .footer { position: absolute; bottom: 40px; left: 40px; right: 40px; background: rgba(0,0,0,0.8); color: white; padding: 20px; border-radius: 12px; }
    </style>
</head>
<body>
    <div class="cover">
        <div class="title">2026一次性电池研究报告<br>南孚电池深度分析</div>
        <div class="subtitle">PRIMARY BATTERY MARKET ANALYSIS</div>
        <div class="category">
            <div class="category-label">核心品类</div>
            <div class="category-value">一次性电池</div>
        </div>
        <div class="footer">
            <div>来源：研究报告 | 42页</div>
        </div>
    </div>
</body>
</html>
