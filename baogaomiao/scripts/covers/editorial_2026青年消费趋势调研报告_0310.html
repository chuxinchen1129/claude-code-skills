<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026青年消费趋势调研报告</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: "Noto Serif SC", serif;
            background: #f5f5f5;
        }
        .font-noto-serif {
            font-family: "Noto Serif SC", serif;
        }
        .cover-container {
            width: 750px;
            height: 1000px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            position: relative;
            overflow: hidden;
        }
        .decorative-circle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
        }
        .accent-line {
            height: 3px;
            background: linear-gradient(90deg, #e94560 0%, #ff6b6b 100%);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen bg-gray-100">
    <div class="cover-container shadow-2xl">
        <!-- Decorative Elements -->
        <div class="decorative-circle bg-white" style="width: 400px; height: 400px; top: -150px; right: -100px;"></div>
        <div class="decorative-circle" style="width: 300px; height: 300px; bottom: -100px; left: -50px; background: #e94560;"></div>
        <div class="decorative-circle bg-white" style="width: 150px; height: 150px; top: 50%; right: 50px; opacity: 0.05;"></div>
        
        <!-- Content -->
        <div class="relative z-10 h-full flex flex-col px-12 py-10">
            <!-- Header -->
            <div class="flex items-center justify-between mb-8">
                <div>
                    <div class="text-white text-opacity-60 text-xs tracking-widest">YOUTH CONSUMPTION</div>
                    <div class="text-white text-opacity-40 text-xs mt-1">2026</div>
                </div>
                <div class="text-right">
                    <div class="text-white text-opacity-60 text-xs tracking-widest">FIRST FINANCIAL</div>
                    <div class="text-white text-opacity-40 text-xs mt-1">第一财经</div>
                </div>
            </div>
            
            <!-- Accent Line -->
            <div class="accent-line mb-8"></div>
            
            <!-- Main Title -->
            <div class="flex-1 flex flex-col justify-center">
                <div class="mb-6">
                    <div class="text-white text-opacity-50 text-sm tracking-wider mb-4">2026 青年消费趋势</div>
                    
                    <h1 class="font-noto-serif font-black text-white leading-tight mb-4" style="font-size: 56px; line-height: 1.2;">
                        青年消费趋势<br/>调研报告
                    </h1>
                    
                    <div class="text-white text-opacity-70 text-lg leading-relaxed mt-6" style="max-width: 480px;">
                        理性消费下的<br/>情绪价值革命
                    </div>
                </div>
                
                <!-- Key Highlights -->
                <div class="grid grid-cols-3 gap-4 mt-8">
                    <div>
                        <div class="text-3xl font-bold text-white mb-1">64%</div>
                        <div class="text-white text-opacity-50 text-xs">货比三家</div>
                    </div>
                    <div>
                        <div class="text-3xl font-bold text-white mb-1">70%+</div>
                        <div class="text-white text-opacity-50 text-xs">优先国货</div>
                    </div>
                    <div>
                        <div class="text-3xl font-bold text-white mb-1">NO.1</div>
                        <div class="text-white text-opacity-50 text-xs">情绪价值</div>
                    </div>
                </div>
            </div>
            
            <!-- Footer Info -->
            <div class="mt-auto">
                <div class="flex items-center justify-between text-white text-opacity-40 text-xs mb-4">
                    <span>32 PAGES</span>
                    <span>2026.02</span>
                </div>
                
                <!-- Keywords -->
                <div class="border-t border-white border-opacity-20 pt-4">
                    <div class="flex flex-wrap gap-2">
                        <span class="px-3 py-1 bg-white bg-opacity-10 rounded-full text-white text-xs">理性消费</span>
                        <span class="px-3 py-1 bg-white bg-opacity-10 rounded-full text-white text-xs">情绪价值</span>
                        <span class="px-3 py-1 bg-white bg-opacity-10 rounded-full text-white text-xs">国货崛起</span>
                        <span class="px-3 py-1 bg-white bg-opacity-10 rounded-full text-white text-xs">健康觉醒</span>
                        <span class="px-3 py-1 bg-white bg-opacity-10 rounded-full text-white text-xs">可持续消费</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
