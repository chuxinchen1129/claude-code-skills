<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026乡村旅游发展报告</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@900&family=Oswald:wght@700&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .font-noto-serif { font-family: 'Noto Serif SC', serif; }
        .font-oswald { font-family: 'Oswald', sans-serif; }
        .font-noto-sans { font-family: 'Noto Sans SC', sans-serif; }
    </style>
</head>
<body class="bg-rose-600 flex items-center justify-center p-8 font-noto-sans text-black" style="min-height: 100vh;">
    <div class="rounded-xl overflow-hidden shadow-2xl bg-rose-600" style="width: 640px; height: 900px;">
        <div class="p-10 flex flex-col" style="height: 100%;">
            <!-- Header -->
            <header class="pb-6 border-b-4 border-black" style="flex-shrink: 0;">
                <h1 class="font-noto-serif font-black text-[3.6rem] leading-tight text-black mb-0">
                    2026<br>乡村旅游<br>深度洞察报告
                </h1>
                <div class="flex justify-between items-baseline">
                    <p class="text-lg text-black font-bold tracking-wider">2026 RURAL TOURISM DEVELO</p>
                    <p class="font-oswald text-xl text-black/80">INDUSTRY REPORT</p>
                </div>
            </header>

            <!-- Summary Section -->
            <div class="py-6 border-b border-black/20">
                <h2 class="font-noto-serif font-bold text-xl text-black mb-3">核心洞察</h2>
                <p class="text-base text-black leading-relaxed">政策引领+消费升级双驱动，乡村旅游迈向1.5万亿市场新蓝海。文旅融合、业态创新、夜间经济、数字化升级。</p>
            </div>

            <!-- Content Grid -->
            <div class="flex-1 grid grid-cols-2 gap-4 py-6">
                <div class="border border-black/30 rounded-lg p-4">
                    <p class="text-xs text-black/60 mb-1">市场规模</p>
                    <p class="font-oswald text-3xl font-bold">1.5万亿</p>
                </div>
                <div class="border border-black/30 rounded-lg p-4">
                    <p class="text-xs text-black/60 mb-1">接待人次</p>
                    <p class="font-oswald text-3xl font-bold">28-30亿</p>
                </div>
                <div class="border border-black/30 rounded-lg p-4">
                    <p class="text-xs text-black/60 mb-1">夜间经济</p>
                    <p class="font-oswald text-3xl font-bold">32%</p>
                </div>
                <div class="border border-black/30 rounded-lg p-4">
                    <p class="text-xs text-black/60 mb-1">人均消费</p>
                    <p class="font-oswald text-3xl font-bold">800-1200</p>
                </div>
            </div>

            <!-- Footer -->
            <footer class="flex justify-between items-end pt-4 border-t border-black/20" style="flex-shrink: 0;">
                <div>
                    <p class="text-sm text-black/80">康旅科技发展有限公司</p>
                    <p class="text-xs text-black/60">2026.03.11</p>
                </div>
                <div class="text-right">
                    <p class="font-oswald text-5xl font-bold text-black/20">11</p>
                    <p class="text-xs text-black/60">29页</p>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
