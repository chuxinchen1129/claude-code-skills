<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>2026中国啤酒行业报告 | 社论风</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@900&family=Oswald:wght@700&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .paper-noise { position: relative; }
        .paper-noise::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.05;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            z-index: 1;
        }
    </style>
</head>
<body class="bg-\[#FB0151] flex items-center justify-center p-8 font-['Noto_Sans_SC',sans-serif] text-black" style="min-height: 100vh;">
    <div id="editorial-card-container" class="rounded-xl overflow-hidden shadow-editorial paper-noise bg-\[#FB0151]" style="width: 640px; height: 900px;">
        <div class="p-10 flex flex-col" style="height: 100%; display: flex; flex-direction: column;">
            <!-- Header -->
            <header class="pb-6 border-b-3 border-black flex-shrink-0">
                <h1 class="font-['Noto_Serif_SC',serif] font-black text-\[3.6rem\] leading-tight mb-0">
                    2026<br>中国啤酒行业报告<br>存量博弈下的高端化
                </h1>
                <div class="flex justify-between items-baseline">
                    <p class="text-lg font-bold tracking-wider">2026 CHINA BEER INDUSTRY: PREMIUMIZATION</p>
                    <p class="text-xl opacity-80">INDUSTRY REPORT</p>
                </div>
            </header>

            <!-- Body -->
            <main class="flex-1 flex flex-col" style="min-height: 0;">
                <!-- 摘要区 -->
                <div class="bg-\[#fb5a7b\] p-5 mb-8 rounded-lg border-l-4 border-black flex-shrink-0">
                    <h2 class="font-['Noto_Serif_SC',serif] font-bold text-xl mb-2">报告摘要</h2>
                    <p class="leading-relaxed text-sm opacity-90">存量博弈下的高端化。高端化、精酿啤酒、本土崛起、渠道变革、三强格局。</p>
                </div>

                <!-- 网格区 -->
                <div class="grid grid-cols-3 gap-4 flex-shrink-0">
                    <div class="bg-white/80 backdrop-blur-sm p-4 rounded-lg shadow-sm">
                        <i class="fa fa-file-text-o text-xl mb-2 block"></i>
                        <h3 class="font-bold text-base mb-1">报告类型</h3>
                        <p class="text-xs opacity-80">行业研究报告</p>
                    </div>
                    <div class="bg-white/80 backdrop-blur-sm p-4 rounded-lg shadow-sm">
                        <i class="fa fa-tag text-xl mb-2 block"></i>
                        <h3 class="font-bold text-base mb-1">核心品类</h3>
                        <p class="text-xs opacity-80">啤酒</p>
                    </div>
                    <div class="bg-white/80 backdrop-blur-sm p-4 rounded-lg shadow-sm">
                        <i class="fa fa-barcode text-xl mb-2 block"></i>
                        <h3 class="font-bold text-base mb-1">报告编号</h3>
                        <p class="text-xs opacity-80">NO.0319</p>
                    </div>
                </div>
            </main>

            <!-- Footer -->
            <footer class="bg-\[#1a110d\] text-white rounded-xl p-6 mt-auto" style="flex-shrink: 0;">
                <div class="flex justify-between items-center">
                    <div>
                        <p class="text-base mb-1">来源：南京掌控网络科技</p>
                        <p class="text-xs opacity-80">2026.03.19 | 26 PAGES</p>
                    </div>
                    <div class="text-center">
                        <span class="font-['Oswald',sans-serif] text-\[6.70rem\] font-bold leading-none">26</span>
                        <p class="text-xs opacity-90">PAGES</p>
                    </div>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
