<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026年珀莱雅化妆品研究报告 | 紧凑社论风</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@900&family=Oswald:wght@700&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow-sm {
                text-shadow: 0 1px 2px rgba(0,0,0,0.05);
            }
            .paper-noise {
                position: relative;
            }
            .paper-noise::before {
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                opacity: 0.05;
                pointer-events: none;
                background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
                z-index: 1;
            }
            .content-wrapper {
                position: relative;
                z-index: 2;
            }
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bgBase: '#E63956',
                        textMain: '#000000',
                        accent: '#000000',
                        borderLine: '#2c241b',
                        bgLight: '#f06078',
                        bgDark: '#2c241b'
                    },
                    fontFamily: {
                        'noto-serif': ['Noto Serif SC', 'serif'],
                        'oswald': ['Oswald', 'sans-serif'],
                        'noto-sans': ['Noto Sans SC', 'sans-serif']
                    },
                    boxShadow: {
                        'editorial': '0 20px 40px -10px rgba(60,48,32,0.15)'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-bgBase min-h-screen flex items-center justify-center p-8 font-noto-sans text-textMain">
    <div class="max-w-[640px] w-full rounded-xl overflow-hidden shadow-editorial paper-noise bg-bgBase">
        <div class="content-wrapper p-10">
            <!-- Header -->
            <header class="mb-10 pb-8 border-b-3 border-textMain">
                <h1 class="font-noto-serif font-black text-[4.5rem] leading-tight text-textMain mb-3">
                    2026年珀莱雅<br>化妆品研究报告
                </h1>
                <div class="flex justify-between items-baseline">
                    <p class="text-xl text-accent font-bold tracking-wider">PROYA COSMETICS 2026</p>
                    <p class="font-oswald text-2xl text-textMain/80">INDUSTRY REPORT</p>
                </div>
            </header>

            <!-- Body -->
            <main class="mb-10">
                <!-- 摘要区 -->
                <div class="bg-bgLight p-6 mb-8 rounded-lg border-l-4 border-accent">
                    <h2 class="font-noto-serif font-bold text-2xl mb-3 text-textMain">新品周期与多品牌收获期</h2>
                    <p class="text-textMain/90 leading-relaxed">本报告深入分析2026年珀莱雅化妆等关键议题，</p>
                </div>

                <!-- 网格区 -->
                <div class="grid grid-cols-2 md:grid-cols-3 gap-6">
                    <div class="bg-white/80 backdrop-blur-sm p-5 rounded-lg shadow-sm">
                        <i class="fa fa-file-text-o text-2xl text-accent mb-3"></i>
                        <h3 class="font-bold text-lg mb-2 text-textMain">报告类型</h3>
                        <p class="text-sm text-textMain/80">美妆行业研究</p>
                    </div>
                    <div class="bg-white/80 backdrop-blur-sm p-5 rounded-lg shadow-sm">
                        <i class="fa fa-calendar text-2xl text-accent mb-3"></i>
                        <h3 class="font-bold text-lg mb-2 text-textMain">发布年份</h3>
                        <p class="text-sm text-textMain/80">2026</p>
                    </div>
                    <div class="bg-white/80 backdrop-blur-sm p-5 rounded-lg shadow-sm">
                        <i class="fa fa-barcode text-2xl text-accent mb-3"></i>
                        <h3 class="font-bold text-lg mb-2 text-textMain">报告编号</h3>
                        <p class="text-sm text-textMain/80">NO.0227</p>
                    </div>
                </div>
            </main>

            <!-- Footer -->
            <footer class="bg-bgDark text-white rounded-xl p-8">
                <div class="flex flex-col md:flex-row justify-between items-center">
                    <div>
                        <p class="font-noto-sans text-lg mb-2">来源：海通国际</p>
                        <p class="text-white/80 text-sm">2026.02.27 | 37 PAGES</p>
                    </div>
                    <div class="mt-6 md:mt-0 text-center">
                        <span class="font-oswald text-[5rem] font-bold text-white leading-none">27</span>
                        <p class="font-noto-sans text-white/90 mt-2">PAGES</p>
                    </div>
                </div>
            </footer>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const elements = [
                'header', 'main > div:first-child',
                'main .grid > div:nth-child(1)',
                'main .grid > div:nth-child(2)',
                'main .grid > div:nth-child(3)',
                'footer'
            ];

            elements.forEach((selector, index) => {
                const el = document.querySelector(selector);
                if (el) {
                    el.style.opacity = '0';
                    el.style.transform = 'translateY(20px)';
                    el.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
                    el.style.transitionDelay = `${index * 0.15}s`;

                    setTimeout(() => {
                        el.style.opacity = '1';
                        el.style.transform = 'translateY(0)';
                    }, 100);
                }
            });
        });
    </script>
</body>
</html>
