<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026中国啤酒行业报告 | 社论风</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&family=Oswald:wght@600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        body { background: #FB0151; font-family: 'Noto Sans SC', sans-serif; }
        #editorial-card-container { font-family: 'Noto Sans SC', sans-serif; }
    </style>
</head>
<body class="flex items-center justify-center p-8">
    <div id="editorial-card-container" style="width: 640px; height: 900px; background: #FB0151; border-radius: 12px; padding: 40px; display: flex; flex-direction: column; box-shadow: 0 20px 40px -10px rgba(60,48,32,0.15);">
        <!-- Header -->
        <div style="border-bottom: 3px solid #000; padding-bottom: 16px; margin-bottom: 16px; flex-shrink: 0;">
            <h1 style="font-family: 'Noto Serif SC', serif; font-weight: 900; font-size: 3.2rem; line-height: 1.15; color: #000; margin: 0;">
                2026<br>中国啤酒行业报告<br>存量博弈下的高端化
            </h1>
            <div style="display: flex; justify-content: space-between; align-items: baseline; margin-top: 10px;">
                <p style="font-size: 0.9rem; color: #000; font-weight: 600;">2026 CHINA BEER INDUSTRY: PREMIUMIZATION</p>
                <p style="font-size: 0.85rem; color: #000; opacity: 0.7;">INDUSTRY REPORT</p>
            </div>
        </div>

        <!-- 摘要区 -->
        <div style="background: #fb5a7b; padding: 14px 18px; border-radius: 8px; border-left: 4px solid #000; margin-bottom: 14px; flex-shrink: 0;">
            <h2 style="font-family: 'Noto Serif SC', serif; font-size: 1rem; font-weight: 700; margin: 0 0 4px 0; color: #000;">报告摘要</h2>
            <p style="font-size: 0.85rem; color: #000; margin: 0;">存量博弈下的高端化。高端化、精酿啤酒、本土崛起、渠道变革、三强格局。</p>
        </div>

        <!-- 三个信息块 -->
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; flex-shrink: 0;">
            <div style="background: rgba(255,255,255,0.85); backdrop-filter: blur(4px); padding: 12px; border-radius: 8px;">
                <i class="fa fa-file-text" style="font-size: 1.1rem; color: #000; margin-bottom: 4px; display: block;"></i>
                <h3 style="font-weight: 700; font-size: 0.8rem; margin: 0 0 3px 0; color: #000;">报告类型</h3>
                <p style="font-size: 0.7rem; color: #000; opacity: 0.7; margin: 0;">行业研究报告</p>
            </div>
            <div style="background: rgba(255,255,255,0.85); backdrop-filter: blur(4px); padding: 12px; border-radius: 8px;">
                <i class="fa fa-tag" style="font-size: 1.1rem; color: #000; margin-bottom: 4px; display: block;"></i>
                <h3 style="font-weight: 700; font-size: 0.8rem; margin: 0 0 3px 0; color: #000;">核心品类</h3>
                <p style="font-size: 0.7rem; color: #000; opacity: 0.7; margin: 0;">啤酒</p>
            </div>
            <div style="background: rgba(255,255,255,0.85); backdrop-filter: blur(4px); padding: 12px; border-radius: 8px;">
                <i class="fa fa-barcode" style="font-size: 1.1rem; color: #000; margin-bottom: 4px; display: block;"></i>
                <h3 style="font-weight: 700; font-size: 0.8rem; margin: 0 0 3px 0; color: #000;">报告编号</h3>
                <p style="font-size: 0.7rem; color: #000; opacity: 0.7; margin: 0;">NO.0319</p>
            </div>
        </div>

        <!-- 占位div，推开底部 -->
        <div style="flex: 1;"></div>

        <!-- 底部信息 -->
        <div style="background: #1a110d; color: #fff; border-radius: 12px; padding: 18px; flex-shrink: 0;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <p style="margin: 0 0 3px 0; font-weight: 500;">来源：南京掌控网络科技</p>
                    <p style="margin: 0; opacity: 0.8; font-size: 0.75rem;">2026.03.19 | 26 PAGES</p>
                </div>
                <div style="text-align: center;">
                    <span style="font-size: 3rem; font-weight: 700; line-height: 1;">26</span>
                    <p style="margin: 0; opacity: 0.9; font-size: 0.7rem;">PAGES</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
