<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智驾未来：AI重塑汽车消费新纪元</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Inter:wght@400;600;700&display=swap');
        body {
            font-family: 'Noto Serif SC', serif;
            margin: 0;
            padding: 0;
            width: 540px;
            height: 720px;
            background: #FB0151;
        }
        .cover-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid #1a110d;
        }
        .header {
            text-align: center;
            border-bottom: 3px solid #1a110d;
            padding-bottom: 20px;
        }
        .year {
            font-size: 24px;
            font-weight: 900;
            color: #000000;
            letter-spacing: 4px;
            margin-bottom: 10px;
        }
        .title-line {
            font-size: 32px;
            font-weight: 900;
            color: #000000;
            line-height: 1.2;
            margin: 5px 0;
        }
        .subtitle {
            font-size: 18px;
            font-weight: 700;
            color: #000000;
            margin-top: 20px;
            padding: 10px;
            background: #fb5a7b;
            border-left: 4px solid #000000;
        }
        .english {
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: #000000;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 20px 0;
            text-align: center;
        }
        .footer {
            font-size: 14px;
            color: #ffffff;
            text-align: center;
            border-top: 2px solid #ffffff;
            padding-top: 15px;
            background: #1a110d;
        }
    </style>
</head>
<body>
    <div class="cover-container">
        <div class="header">
            <div class="year">2026</div>
            <div class="title-line">AI</div>
        </div>

        <div class="subtitle">
            核心要点
        </div>

        <div class="english">
            AI RESHAPING AUTOMOTIVE CONSUMPTION
        </div>

        <div class="footer" style="padding: 15px; border-radius: 12px; background: #1a110d;">
            <div>东方财富 | 45页 | 行业研究报告</div>
        </div>
    </div>
</body>
</html>
