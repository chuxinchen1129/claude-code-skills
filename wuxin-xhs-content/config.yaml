# 小红书科普图文生成器配置

# 引用共享配置
include: ../../03_WUXIN_CONTENT/assets/config.yaml

# ==================== 技能特定配置 ====================

defaults:
  # 内容参数
  sections: 3                       # 内容板块数
  target_words: 500                 # 目标字数
  brand_integration: soft           # 品牌植入程度

  # 生成参数
  api:
    provider: zhipuai               # API 提供商
    model: glm-4.7                  # 模型名称
    api_key_env: ZHIPUAI_API_KEY    # 环境变量名
    max_tokens: 3000
    temperature: 0.7
    timeout: 120

  # 日期范围生成
  date_range:
    default_days: 7                 # 默认生成天数
    publish_days: [1, 2, 3, 4]      # 发布日（周一到周四）

# ==================== 资源路径 ====================

resources:
  # 营销日历
  marketing_calendar: ../../03_WUXIN_CONTENT/00_Strategy_Planning/marketing_calendar.csv

  # 科学概念库
  science_concepts: ../../03_WUXIN_CONTENT/05_Sleep_Science_Wiki/sleep_science.json

  # 通用主题库
  general_topics: ../../03_WUXIN_CONTENT/02_话题库/general_topics_extended.csv

# ==================== 输出配置 ====================

output:
  dir: ./output
  format: csv
  encoding: utf-8

# 文件命名模板
naming:
  content_batch: "Content_{start_date}_to_{end_date}.csv"
  single_content: "Content_{date}_{topic}.csv"
